<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WSHSE Dashboard Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { margin: 10px 0; padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #1e3a8a; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>WSHSE Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">Access Dashboard</button>
        <p id="error" style="color: red;"></p>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // UPDATED: This now sets the 'authenticated' flag before redirecting
            if (user === "WSHSE" && pass === "Spartacus") {
                sessionStorage.setItem("authenticated", "true");
                window.location.href = "dashboard.html"; 
            } else {
                document.getElementById("error").innerText = "Invalid credentials!";
            }
        }
    </script>
</body>
</html>
